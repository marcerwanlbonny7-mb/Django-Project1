{% extends 'base.html' %}{% load static %}
{% block title %}Connexion{% endblock %}
{% block auth_content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="logo">
      <i class="bi bi-shield-check" style="font-size:48px;color:#1a237e"></i>
      <h1>COFINANCE CI</h1>
      <p>Plateforme digitale de microfinance</p>
    </div>
    <form id="login-form">
      <div class="alert alert-danger d-none" id="login-error"></div>
      <div class="mb-3">
        <label class="form-label">Nom d'utilisateur</label>
        <input type="text" class="form-control" id="login-username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="login-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn">Se connecter</button>
    </form>
    <p class="text-center mt-3 mb-0">
      <a href="/register/" class="text-decoration-none">Créer un compte client</a>
    </p>
    <div class="mt-3 pt-3 border-top text-center">
      <small class="text-muted">Démo: <code>admin</code> / <code>admin123</code></small>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Connexion...';
  try {
    const user = await API.login(
      document.getElementById('login-username').value,
      document.getElementById('login-password').value
    );
    window.location.href = '/dashboard/';
  } catch(err) {
    const el = document.getElementById('login-error');
    el.textContent = err.message;
    el.classList.remove('d-none');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
});
</script>
{% endblock %}
