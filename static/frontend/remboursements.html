<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remboursements — COFINANCE CI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <button class="hamburger" id="hamburger">&#9776;</button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><h2>COFINANCE CI</h2><span id="sidebar-brand-sub">Remboursements</span></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-info"><div class="avatar" id="sidebar-avatar">C</div><div class="user-details"><div class="user-name" id="sidebar-name">Utilisateur</div><div class="user-role" id="sidebar-role">Client</div></div></div>
        <button class="logout-btn" onclick="logout()">&#8678; Déconnexion</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header"><div><h1>Remboursements</h1><p class="subtitle" id="page-subtitle">Suivez vos échéances et paiements</p></div><button class="btn btn-accent" id="btn-new-payment" style="display:none;" onclick="openModal('payment-modal')">+ Enregistrer paiement</button></div>
      <div class="page-body">
        <div class="tabs"><button class="tab active" onclick="switchTab('echeances',this)">Échéances</button><button class="tab" onclick="switchTab('historique',this)">Historique</button></div>
        <div class="tab-content active" id="tab-echeances"><div id="echeances-container"><div class="loading-spinner"><div class="spinner"></div></div></div></div>
        <div class="tab-content" id="tab-historique"><div id="historique-container"><div class="loading-spinner"><div class="spinner"></div></div></div></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="payment-modal"><div class="modal"><div class="modal-header"><h3>Enregistrer un paiement</h3><button class="modal-close">&times;</button></div>
    <form id="payment-form"><div class="modal-body">
      <div id="payment-form-error"></div>
      <div class="form-group"><label for="payment-echeance">Échéance</label><select id="payment-echeance" required><option value="">Sélectionnez</option></select><div class="error-text"></div></div>
      <div class="form-group"><label for="payment-montant">Montant (FCFA)</label><input type="number" id="payment-montant" min="1" step="100" required><div class="error-text"></div></div>
      <div class="form-group"><label>Mode de paiement</label>
        <div class="payment-options" id="payment-mode">
          <div class="payment-option" data-value="ORANGE_MONEY" onclick="selectPayment(this)"><div class="pay-icon">&#128179;</div><div class="pay-label">Orange Money</div></div>
          <div class="payment-option" data-value="WAVE" onclick="selectPayment(this)"><div class="pay-icon">&#127760;</div><div class="pay-label">Wave</div></div>
          <div class="payment-option" data-value="MTN_MOMO" onclick="selectPayment(this)"><div class="pay-icon">&#128241;</div><div class="pay-label">MTN MoMo</div></div>
          <div class="payment-option" data-value="ESPECES" onclick="selectPayment(this)"><div class="pay-icon">&#128176;</div><div class="pay-label">Espèces</div></div>
        </div><input type="hidden" id="payment-mode-input"><div class="error-text"></div>
      </div>
    </div><div class="modal-footer"><button type="button" class="btn btn-outline" onclick="closeModal('payment-modal')">Annuler</button><button type="submit" class="btn btn-primary" id="payment-submit-btn">Enregistrer</button></div></form></div></div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    let isClient = true;
    const clientNav = [{h:'dashboard_client.html',i:'&#9673;',l:'Tableau de bord'},{h:'credits.html',i:'&#9733;',l:'Mes Crédits'},{h:'remboursements.html',i:'&#8635;',l:'Remboursements',a:true},{h:'assurances.html',i:'&#9724;',l:'Assurances'},{h:'notifications.html',i:'&#9881;',l:'Notifications'},{h:'chat.html',i:'&#9993;',l:'Chat'}];
    const adminNav = [{h:'dashboard_admin.html',i:'&#9673;',l:'Tableau de bord'},{h:'credits.html',i:'&#9733;',l:'Demandes'},{h:'remboursements.html',i:'&#8635;',l:'Remboursements',a:true},{h:'assurances.html',i:'&#9724;',l:'Assurances'},{h:'notifications.html',i:'&#9881;',l:'Notifications'},{h:'chat.html',i:'&#9993;',l:'Conversations'}];
    document.addEventListener('DOMContentLoaded', async function () {
      checkAuth(); isClient = getUserRole() === 'CLIENT';
      const name = getUserName(); document.getElementById('sidebar-avatar').textContent = name.charAt(0).toUpperCase();
      document.getElementById('sidebar-name').textContent = name;
      document.getElementById('sidebar-role').textContent = isClient ? 'Client' : (getUserRole() === 'ADMIN' ? 'Administrateur' : 'Agent');
      document.getElementById('sidebar-brand-sub').textContent = isClient ? 'Espace Client' : 'Administration';
      document.getElementById('sidebar-nav').innerHTML = (isClient ? clientNav : adminNav).map(item => `<a href="${item.h}"${item.a?' class="active"':''}><span class="icon">${item.i}</span> ${item.l}</a>`).join('');
      if (!isClient) { document.getElementById('btn-new-payment').style.display = 'inline-flex'; document.getElementById('page-subtitle').textContent = 'Enregistrez et suivez les paiements'; }
      await Promise.all([loadEcheances(), loadHistorique()]);
    });
    function switchTab(tab, btn) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); document.getElementById('tab-'+tab).classList.add('active'); }
    async function loadEcheances() {
      const c = document.getElementById('echeances-container'); c.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
      try {
        const data = await apiGet('/api/remboursements/echeances/');
        const items = Array.isArray(data) ? data : (data.results || data.echeances || []);
        if (!items.length) { c.innerHTML = '<div class="empty-state"><div class="icon">&#128197;</div><h3>Aucune échéance</h3></div>'; return; }
        c.innerHTML = '<div class="table-container"><table><thead><tr><th>Crédit</th><th>Date</th><th>Montant</th><th>Statut</th></tr></thead><tbody>' +
          items.map(e => `<tr><td>${sanitize(e.credit_info || e.credit || 'N°'+(e.credit_id||''))}</td><td>${formatDate(e.date_echeance||e.date)}</td><td><strong>${formatCurrency(e.montant)}</strong></td><td><span class="statut ${statutClass(e.statut||'EN_ATTENTE')}">${statutLabel(e.statut||'EN_ATTENTE')}</span></td></tr>`).join('') + '</tbody></table></div>';
      } catch (e) { c.innerHTML = `<div class="alert alert-danger">${sanitize(e.message)}</div>`; }
    }
    async function loadHistorique() {
      const c = document.getElementById('historique-container'); c.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
      try {
        const data = await apiGet('/api/remboursements/historique/');
        const items = Array.isArray(data) ? data : (data.results || data.historique || []);
        if (!items.length) { c.innerHTML = '<div class="empty-state"><div class="icon">&#128203;</div><h3>Aucun historique</h3></div>'; return; }
        c.innerHTML = '<div class="table-container"><table><thead><tr><th>Date</th><th>Montant</th><th>Mode</th><th>Statut</th></tr></thead><tbody>' +
          items.map(h => `<tr><td>${formatDate(h.date_paiement||h.date||h.created_at)}</td><td><strong>${formatCurrency(h.montant)}</strong></td><td>${sanitize(h.mode_paiement||'-')}</td><td><span class="statut ${statutClass(h.statut||'PAYEE')}">${statutLabel(h.statut||'PAYEE')}</span></td></tr>`).join('') + '</tbody></table></div>';
      } catch (e) { c.innerHTML = `<div class="alert alert-danger">${sanitize(e.message)}</div>`; }
    }
    function selectPayment(el) { document.querySelectorAll('.payment-option').forEach(o=>o.classList.remove('selected')); el.classList.add('selected'); document.getElementById('payment-mode-input').value = el.dataset.value; }
    document.getElementById('payment-form').addEventListener('submit', async function (e) {
      e.preventDefault(); clearErrors();
      const echeance = document.getElementById('payment-echeance').value, montant = document.getElementById('payment-montant').value, mode = document.getElementById('payment-mode-input').value;
      if (!echeance) { showFieldError('payment-echeance', 'Champ requis'); return; }
      if (!montant || montant <= 0) { showFieldError('payment-montant', 'Montant invalide'); return; }
      if (!mode) { showToast('Sélectionnez un mode de paiement', 'error'); return; }
      const btn = document.getElementById('payment-submit-btn'); btn.disabled = true; btn.innerHTML = '<span class="loading-inline"><span class="spinner-small"></span>...</span>';
      try { await apiPost('/api/remboursements/', { echeance: parseInt(echeance), montant: parseInt(montant), mode_paiement: mode }); showToast('Paiement enregistré', 'success'); closeModal('payment-modal'); document.getElementById('payment-form').reset(); document.querySelectorAll('.payment-option').forEach(o=>o.classList.remove('selected')); await Promise.all([loadEcheances(), loadHistorique()]); }
      catch (e) { document.getElementById('payment-form-error').innerHTML = `<div class="alert alert-danger">${sanitize(e.message)}</div>`; }
      finally { btn.disabled = false; btn.textContent = 'Enregistrer'; }
    });
    const _openModal = window.openModal; window.openModal = function(id) { if (id === 'payment-modal') loadEcheancesForSelect(); _openModal && _openModal(id); };
    async function loadEcheancesForSelect() {
      try {
        const data = await apiGet('/api/remboursements/echeances/');
        const items = Array.isArray(data) ? data : (data.results || data.echeances || []);
        const select = document.getElementById('payment-echeance');
        select.innerHTML = '<option value="">Sélectionnez</option>';
        items.filter(e => e.statut === 'EN_ATTENTE' || e.statut === 'EN_RETARD').forEach(e => { const o = document.createElement('option'); o.value = e.id; o.textContent = formatDate(e.date_echeance||e.date) + ' — ' + formatCurrency(e.montant); select.appendChild(o); });
      } catch (e) { showToast('Erreur: '+e.message, 'error'); }
    }
  </script>
</body>
</html>
